name: Déploiement recette PWA
run-name: "Déploiement recette PWA par ${{ github.actor }} — ${{ github.sha }}"
on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Vite app (recette)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          VITE_OIDC_AUTHORITY: ${{ vars.VITE_OIDC_AUTHORITY }}
          VITE_OIDC_CLIENT_ID: ${{ secrets.VITE_OIDC_CLIENT_ID_RECETTE }}
          VITE_OIDC_CLIENT_SECRET: ${{ secrets.VITE_OIDC_CLIENT_SECRET_RECETTE }}
          VITE_OIDC_SCOPE: ${{ vars.VITE_OIDC_SCOPE }}
          VITE_BACKEND_BASEURL: https://backend-test.supercoop.fr
          VITE_APP_ENV: recette

      - name: Upload build files
        uses: actions/upload-artifact@v4
        with:
          name: dist-recette
          path: ./dist

  deploy:
    name: Deploy (recette)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-recette
          path: ./dist

      - name: Cleanup old files
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY_WEBAPP_FRONTEND }}
          port: ${{ vars.SSH_PORT }}
          script: rm -rf /data/supercoop/app-pwa-recette/*

      - name: Upload build to server
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_KEY_WEBAPP_FRONTEND }}
          port: ${{ vars.SSH_PORT }}
          source: "./dist/*"
          target: "/data/supercoop/app-pwa-recette/"
          strip_components: 1
          tar_tmp_path: /tmp/
